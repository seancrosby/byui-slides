name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        npm install
        # Note: mermaid-cli is called via npx in the script, 
        # but we could pre-install it if we wanted.

    - name: Run Python Unit Tests
      run: python3 -m unittest discover tests

    - name: Run Build Integration Test
      run: |
        chmod +x build.sh
        ./build.sh
